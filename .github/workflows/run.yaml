name: Run python script on push
on: [push]
jobs:
  run-judal-script:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # 원하는 버전 입력
          cache: "pip" # 위에서 배운 캐싱도 한 줄로 추가!

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 코드 실행
        run: |
          mkdir tmp
          python judal.py

      - name: 결과 출력
        run: |
          cat ./DAY
          ls -al *.md
      - name: Gist 업로드
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: "ab2e3c2825bd77e772a5bae939bae5f5" # 생성해 둔 Gist ID 입력
        run: |
          # 1. DAY 파일에서 날짜 읽기
          DAY_STR=$(cat ./DAY)
          FILENAME="stock_interest_${DAY_STR}.md"
          # 2. 파일 존재 확인 (디버깅용)
          if [ ! -f "$FILENAME" ]; then
            echo "에러: $FILENAME 파일을 찾을 수 없습니다."
            exit 1
          fi
          # 3. GitHub CLI를 사용하여 Gist 업데이트
          # -f 옵션은 해당 이름의 파일이 Gist에 있으면 덮어쓰고, 없으면 추가합니다.
          gh gist edit $GIST_ID -f "$FILENAME"="$FILENAME"
